<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم الإدارة</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background: #f8fafc; margin: 0; padding: 0; }
        .sidebar { width: 250px; background: #1e293b; color: white; position: fixed; top: 0; bottom: 0; right: 0; padding: 20px; }
        .sidebar h2 { color: #10b981; margin-bottom: 30px; }
        .sidebar a { display: block; color: white; text-decoration: none; padding: 12px; margin-bottom: 10px; border-radius: 8px; background: rgba(255,255,255,0.1); }
        .sidebar a:hover { background: rgba(255,255,255,0.2); }
        .main-content { margin-right: 290px; padding: 40px; }
        .card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 30px; }
        h1 { color: #1e293b; margin-top: 0; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 600; color: #475569; }
        .form-group input, .form-group textarea { width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 8px; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        .btn-save { padding: 12px 24px; background: #059669; color: white; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; font-size: 16px; }
        .btn-save:hover { background: #047857; }
        .img-preview { max-width: 100%; height: auto; margin-top: 10px; border-radius: 8px; display: none; }
        
        #galleryContainer { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 10px; }
        .gallery-item { position: relative; width: 150px; height: 150px; }
        .gallery-item img { width: 100%; height: 100%; object-fit: cover; border-radius: 8px; }
        .gallery-item button { position: absolute; top: 5px; right: 5px; background: red; color: white; border: none; border-radius: 50%; width: 25px; height: 25px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>لوحة التحكم</h2>
        <a href="#general">الإعدادات العامة</a>
        <a href="#banners">البانرات</a>
        <a href="#images">الصور</a>
        <a href="#" onclick="logout()">تسجيل الخروج</a>
        <a href="index.html" target="_blank" style="background:#059669; text-align:center; margin-top:30px;">عرض الموقع</a>
    </div>
    
    <div class="main-content">
        <h1>مرحباً، محمد</h1>
        
        <div class="card" id="general">
            <h3>أرقام الاتصال والبيانات الأساسية</h3>
            <div class="form-group">
                <label>رقم الهاتف</label>
                <input type="text" id="phoneInput" dir="ltr">
            </div>
            <div class="form-group">
                <label>البريد الإلكتروني</label>
                <input type="text" id="emailInput">
            </div>
            <div class="form-group">
                <label>شعار الموقع (اللوجو - رابط صورة)</label>
                <input type="text" id="logoUrlInput" placeholder="أدخل رابط صورة الشعار هنا (مثال: https://example.com/logo.png)">
            </div>
            <button class="btn-save" onclick="saveContact()">حفظ التعديلات</button>
        </div>

        <div class="card" id="banners">
            <h3>إعدادات البانر الرئيسي</h3>
            <div class="form-group">
                <label>العنوان الرئيسي</label>
                <input type="text" id="heroTitleInput">
            </div>
            <div class="form-group">
                <label>الكلمة المميزة (باللون الأخضر)</label>
                <input type="text" id="heroAccentInput">
            </div>
            <div class="form-group">
                <label>الوصف</label>
                <textarea id="heroDescInput" rows="3"></textarea>
            </div>
            <div class="form-group">
                <label>صورة البانر (رابط)</label>
                <input type="text" id="heroBgInput" placeholder="https://example.com/image.jpg" oninput="previewHeroBg()">
                <img id="heroBgPreview" class="img-preview">
            </div>
            <button class="btn-save" onclick="saveBanner()">حفظ البانر</button>
        </div>

        <div class="card" id="images">
            <h3>معرض الصور الإضافية</h3>
            <div class="form-group">
                <label>إضافة صورة (رابط)</label>
                <div style="display:flex; gap:10px;">
                    <input type="text" id="newImageInput" placeholder="أدخل رابط الصورة...">
                    <button class="btn-save" onclick="addImage()">إضافة</button>
                </div>
            </div>
            <div id="galleryContainer"></div>
        </div>

        <div class="card" id="videos">
            <h3>الفيديوهات التعليمية</h3>
            <div class="form-group">
                <label>إضافة فيديو (رابط يوتيوب أو مباشر)</label>
                <div style="display:flex; gap:10px;">
                    <input type="text" id="newVideoInput" placeholder="أدخل رابط الفيديو (مثال: يوتيوب)...">
                    <button class="btn-save" onclick="addVideo()">إضافة</button>
                </div>
            </div>
            <div id="videosContainer" style="display: flex; flex-wrap: wrap; gap: 10px; margin-top: 10px;"></div>
        </div>
    </div>

    <script>
        if (localStorage.getItem('isAdminLoggedIn') !== 'true') {
            window.location.href = 'login.html';
        }

        function logout() {
            localStorage.removeItem('isAdminLoggedIn');
            window.location.href = 'login.html';
        }

        function getSiteData() {
            return JSON.parse(localStorage.getItem('siteData')) || { 
                phone: '+966 50 123 4567',
                email: 'info@multisystem.sa',
                logoUrl: '',
                heroTitle: 'نظام محاسبي',
                heroAccent: 'متكامل لأعمالك',
                heroDesc: 'إدارة مالية احترافية، فواتير إلكترونية، تقارير ذكية، ومتابعة المخزون - كل ما تحتاجه في منصة واحدة سهلة الاستخدام.',
                heroBg: '',
                gallery: [],
                videos: [],
                floatingImages: []
            };
        }

        function saveSiteData(data) {
            localStorage.setItem('siteData', JSON.stringify(data));
            alert('تم الحفظ بنجاح');
        }

        window.onload = function() {
            var data = getSiteData();
            document.getElementById('phoneInput').value = data.phone;
            document.getElementById('emailInput').value = data.email;
            document.getElementById('logoUrlInput').value = data.logoUrl || '';
            document.getElementById('heroTitleInput').value = data.heroTitle;
            document.getElementById('heroAccentInput').value = data.heroAccent;
            document.getElementById('heroDescInput').value = data.heroDesc;
            document.getElementById('heroBgInput').value = data.heroBg || '';
            previewHeroBg();
            renderGallery(data.gallery);
            renderVideos(data.videos);
        };

        function saveContact() {
            var data = getSiteData();
            data.phone = document.getElementById('phoneInput').value;
            data.email = document.getElementById('emailInput').value;
            data.logoUrl = document.getElementById('logoUrlInput').value;
            saveSiteData(data);
        }

        function saveBanner() {
            var data = getSiteData();
            data.heroTitle = document.getElementById('heroTitleInput').value;
            data.heroAccent = document.getElementById('heroAccentInput').value;
            data.heroDesc = document.getElementById('heroDescInput').value;
            data.heroBg = document.getElementById('heroBgInput').value;
            saveSiteData(data);
        }

        function previewHeroBg() {
            var url = document.getElementById('heroBgInput').value;
            var preview = document.getElementById('heroBgPreview');
            if (url) {
                preview.src = url;
                preview.style.display = 'block';
            } else {
                preview.style.display = 'none';
            }
        }

        function addImage() {
            var input = document.getElementById('newImageInput');
            var url = input.value;
            if (url) {
                var data = getSiteData();
                if (!data.gallery) data.gallery = [];
                data.gallery.push(url);
                saveSiteData(data);
                input.value = '';
                renderGallery(data.gallery);
            }
        }

        function removeImage(index) {
            if(confirm('هل أنت متأكد من حذف هذه الصورة؟')) {
                var data = getSiteData();
                data.gallery.splice(index, 1);
                saveSiteData(data);
                renderGallery(data.gallery);
            }
        }

        function renderGallery(gallery) {
            var container = document.getElementById('galleryContainer');
            container.innerHTML = '';
            if (gallery && gallery.length > 0) {
                gallery.forEach(function(url, index) {
                    var div = document.createElement('div');
                    div.className = 'gallery-item';
                    div.innerHTML = '<img src="' + url + '"><button onclick="removeImage(' + index + ')">X</button>';
                    container.appendChild(div);
                });
            }
        }

        function addVideo() {
            var input = document.getElementById('newVideoInput');
            var url = input.value;
            if (url) {
                var data = getSiteData();
                if (!data.videos) data.videos = [];
                data.videos.push(url);
                saveSiteData(data);
                input.value = '';
                renderVideos(data.videos);
            }
        }

        function removeVideo(index) {
            if(confirm('هل أنت متأكد من حذف هذا الفيديو؟')) {
                var data = getSiteData();
                data.videos.splice(index, 1);
                saveSiteData(data);
                renderVideos(data.videos);
            }
        }

        function renderVideos(videos) {
            var container = document.getElementById('videosContainer');
            container.innerHTML = '';
            if (videos && videos.length > 0) {
                videos.forEach(function(url, index) {
                    var div = document.createElement('div');
                    div.style.position = 'relative';
                    div.style.width = '200px';
                    div.style.padding = '10px';
                    div.style.background = '#f1f5f9';
                    div.style.borderRadius = '8px';
                    div.style.wordBreak = 'break-all';
                    div.innerHTML = '<a href="' + url + '" target="_blank" style="font-size:14px;">' + url.substring(0, 30) + '...</a><button onclick="removeVideo(' + index + ')" style="position:absolute; top:-5px; right:-5px; background:red; color:white; border:none; border-radius:50%; width:20px; height:20px; cursor:pointer;">X</button>';
                    container.appendChild(div);
                });
            }
        }
    </script>
</body>
</html>
