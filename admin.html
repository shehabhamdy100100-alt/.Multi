<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم الإدارة</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Cairo', sans-serif; background: #f8fafc; margin: 0; padding: 0; }
        .sidebar { width: 250px; background: #1e293b; color: white; position: fixed; top: 0; bottom: 0; right: 0; padding: 20px; }
        .sidebar h2 { color: #10b981; margin-bottom: 30px; }
        .sidebar a { display: block; color: white; text-decoration: none; padding: 12px; margin-bottom: 10px; border-radius: 8px; background: rgba(255,255,255,0.1); }
        .sidebar a:hover { background: rgba(255,255,255,0.2); }
        .main-content { margin-right: 290px; padding: 40px; }
        .header-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 30px; }
        h1 { color: #1e293b; margin: 0; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 600; color: #475569; }
        .form-group input, .form-group textarea { width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 8px; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        .btn-save-main { padding: 12px 32px; background: #059669; color: white; border: none; border-radius: 50px; font-weight: 700; cursor: pointer; font-size: 16px; box-shadow: 0 4px 15px rgba(5,150,105,0.3); transition: all 0.3s; }
        .btn-save-main:hover { background: #047857; transform: translateY(-2px); }
        .btn-upload { padding: 12px 24px; background: #3b82f6; color: white; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; font-size: 14px; }
        .btn-upload:hover { background: #2563eb; }
        .img-preview { max-width: 100%; height: auto; margin-top: 10px; border-radius: 8px; display: none; }
        
        #galleryContainer { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 10px; }
        .gallery-item { position: relative; width: 150px; height: 150px; }
        .gallery-item img { width: 100%; height: 100%; object-fit: cover; border-radius: 8px; }
        .gallery-item button { position: absolute; top: 5px; right: 5px; background: red; color: white; border: none; border-radius: 50%; width: 25px; height: 25px; cursor: pointer; }
        
        /* Toast Notification */
        #toast { visibility: hidden; min-width: 250px; background-color: #10b981; color: #fff; text-align: center; border-radius: 8px; padding: 16px; position: fixed; z-index: 1000; left: 50%; bottom: 30px; font-size: 16px; transform: translateX(-50%); box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        #toast.show { visibility: visible; animation: fadein 0.5s, fadeout 0.5s 2.5s; }
        @keyframes fadein { from {bottom: 0; opacity: 0;} to {bottom: 30px; opacity: 1;} }
        @keyframes fadeout { from {bottom: 30px; opacity: 1;} to {bottom: 0; opacity: 0;} }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>لوحة التحكم</h2>
        <a href="#general">الإعدادات العامة</a>
        <a href="#banners">البانرات</a>
        <a href="#images">الصور</a>
        <a href="#" onclick="logout()">تسجيل الخروج</a>
        <a href="index.html" target="_blank" style="background:#059669; text-align:center; margin-top:30px;">عرض الموقع</a>
    </div>
    
    <div class="main-content">
        <div class="header-bar">
            <h1>مرحباً، محمد</h1>
            <button class="btn-save-main" onclick="saveAllSettings()" id="mainSaveBtn">حفظ التعديلات 💾</button>
        </div>
        
        <div class="card" id="general">
            <h3>أرقام الاتصال والبيانات الأساسية</h3>
            <div class="form-group">
                <label>رقم الهاتف</label>
                <input type="text" id="phoneInput" dir="ltr">
            </div>
            <div class="form-group">
                <label>البريد الإلكتروني</label>
                <input type="text" id="emailInput">
            </div>
            <div class="form-group">
                <label>شعار الموقع (اللوجو)</label>
                <div style="display:flex; gap:10px;">
                    <input type="file" id="logoFileInput" accept="image/*" style="flex:1;">
                    <button class="btn-upload" onclick="uploadLogo()" id="btnUploadLogo">رفع الصورة</button>
                </div>
                <input type="hidden" id="logoUrlInput">
                <img id="logoPreview" class="img-preview" style="max-height:80px;">
            </div>
        </div>

        <div class="card" id="banners">
            <h3>إعدادات البانر الرئيسي</h3>
            <div class="form-group">
                <label>العنوان الرئيسي</label>
                <input type="text" id="heroTitleInput">
            </div>
            <div class="form-group">
                <label>الكلمة المميزة (باللون الأخضر)</label>
                <input type="text" id="heroAccentInput">
            </div>
            <div class="form-group">
                <label>الوصف</label>
                <textarea id="heroDescInput" rows="3"></textarea>
            </div>
            <div class="form-group">
                <label>صورة البانر</label>
                <div style="display:flex; gap:10px;">
                    <input type="file" id="heroBgFileInput" accept="image/*" style="flex:1;">
                    <button class="btn-upload" onclick="uploadHeroBg()" id="btnUploadHero">رفع الصورة</button>
                </div>
                <input type="hidden" id="heroBgInput">
                <img id="heroBgPreview" class="img-preview">
            </div>
        </div>

        <div class="card" id="images">
            <h3>معرض الصور الإضافية</h3>
            <div class="form-group">
                <label>رفع صورة للمعرض</label>
                <div style="display:flex; gap:10px;">
                    <input type="file" id="newImageFileInput" accept="image/*" style="flex:1;">
                    <button class="btn-upload" onclick="uploadGalleryImage()" id="btnUploadGallery">رفع الصورة</button>
                </div>
            </div>
            <div id="galleryContainer"></div>
        </div>

        <div class="card" id="videos">
            <h3>الفيديوهات التعليمية</h3>
            <div class="form-group">
                <label>رفع فيديو من الجهاز (أقصى حجم 50 ميجا)</label>
                <div style="display:flex; gap:10px;">
                    <input type="file" id="newVideoFileInput" accept="video/*" style="flex:1;">
                    <button class="btn-upload" onclick="uploadVideoFile()" id="btnUploadVideo">رفع الفيديو</button>
                </div>
            </div>
            <div class="form-group">
                <label>أو إضافة رابط فيديو (مثال: يوتيوب)</label>
                <div style="display:flex; gap:10px;">
                    <input type="text" id="newVideoInput" placeholder="أدخل رابط الفيديو...">
                    <button class="btn-upload" onclick="addVideoLink()">إضافة الرابط</button>
                </div>
            </div>
            <div id="videosContainer" style="display: flex; flex-wrap: wrap; gap: 10px; margin-top: 10px;"></div>
        </div>
    </div>

    <div id="toast">تم حفظ التعديلات بنجاح! ✅</div>

    <script>
        if (localStorage.getItem('isAdminLoggedIn') !== 'true') {
            window.location.href = 'login.html';
        }

        function logout() {
            localStorage.removeItem('isAdminLoggedIn');
            window.location.href = 'login.html';
        }

        function showToast(message) {
            var toast = document.getElementById("toast");
            if(message) toast.innerText = message;
            toast.className = "show";
            setTimeout(function(){ toast.className = toast.className.replace("show", ""); }, 3000);
        }

        // Supabase configuration - FIXING THE BUG HERE
        const supabaseUrl = 'https://allglccmckuqfbjcqivg.supabase.co';
        const supabaseKey = 'sb_publishable_EFfX1IkWGCVLkrBJcmh9Cw_c-ejYHM_';
        const sb = window.supabase.createClient(supabaseUrl, supabaseKey);

        window.onload = async function() {
            await loadData();
        };

        async function loadData() {
            try {
                // Load Settings
                const { data: settings, error: err1 } = await sb.from('site_settings').select('*');
                if (err1) throw err1;
                if (settings) {
                    settings.forEach(s => {
                        if (s.key === 'contact') {
                            document.getElementById('phoneInput').value = s.value.phone || '';
                            document.getElementById('emailInput').value = s.value.email || '';
                        } else if (s.key === 'brand') {
                            document.getElementById('logoUrlInput').value = s.value.logoUrl || '';
                            if (s.value.logoUrl) {
                                document.getElementById('logoPreview').src = s.value.logoUrl;
                                document.getElementById('logoPreview').style.display = 'block';
                            }
                        } else if (s.key === 'hero') {
                            document.getElementById('heroTitleInput').value = s.value.title || '';
                            document.getElementById('heroAccentInput').value = s.value.accent || '';
                            document.getElementById('heroDescInput').value = s.value.desc || '';
                            document.getElementById('heroBgInput').value = s.value.bgUrl || '';
                            if (s.value.bgUrl) {
                                document.getElementById('heroBgPreview').src = s.value.bgUrl;
                                document.getElementById('heroBgPreview').style.display = 'block';
                            }
                        }
                    });
                }

                // Load Gallery
                const { data: gallery, error: err2 } = await sb.from('gallery').select('*').order('created_at', { ascending: false });
                if (err2) throw err2;
                renderGallery(gallery || []);

                // Load Videos
                const { data: videos, error: err3 } = await sb.from('videos').select('*').order('created_at', { ascending: false });
                if (err3) throw err3;
                renderVideos(videos || []);
            } catch (err) {
                console.error("Error loading data:", err);
                alert("حدث خطأ أثناء تحميل البيانات: " + err.message + "\n\nتأكد أنك قمت بتشغيل كود SQL في Supabase!");
            }
        }

        // Unified Save Function
        async function saveAllSettings() {
            const btn = document.getElementById('mainSaveBtn');
            btn.innerText = 'جاري الحفظ... ⏳';
            btn.style.opacity = '0.7';

            try {
                // 1. Contact Info
                const phone = document.getElementById('phoneInput').value;
                const email = document.getElementById('emailInput').value;
                const {error: e1} = await sb.from('site_settings').upsert({ key: 'contact', value: { phone, email } });
                if(e1) throw e1;
                
                // 2. Brand (Logo)
                const logoUrl = document.getElementById('logoUrlInput').value;
                const {error: e2} = await sb.from('site_settings').upsert({ key: 'brand', value: { logoUrl } });
                if(e2) throw e2;

                // 3. Banner
                const title = document.getElementById('heroTitleInput').value;
                const accent = document.getElementById('heroAccentInput').value;
                const desc = document.getElementById('heroDescInput').value;
                const bgUrl = document.getElementById('heroBgInput').value;
                const {error: e3} = await sb.from('site_settings').upsert({ key: 'hero', value: { title, accent, desc, bgUrl } });
                if(e3) throw e3;

                showToast("تم حفظ التعديلات بنجاح! ✅");
            } catch (err) {
                console.error(err);
                alert("حدث خطأ أثناء الحفظ! " + err.message);
            }

            btn.innerText = 'حفظ التعديلات 💾';
            btn.style.opacity = '1';
        }

        async function uploadFileToSupabase(file) {
            const fileName = Date.now() + '_' + Math.random().toString(36).substring(7) + '_' + file.name.replace(/[^a-zA-Z0-9.\-_]/g, '');
            const { data, error } = await sb.storage.from('media').upload(fileName, file);
            if (error) {
                alert('حدث خطأ أثناء الرفع: ' + error.message);
                throw error;
            }
            const { data: publicUrlData } = sb.storage.from('media').getPublicUrl(fileName);
            return publicUrlData.publicUrl;
        }

        async function uploadLogo() {
            const fileInput = document.getElementById('logoFileInput');
            const btn = document.getElementById('btnUploadLogo');
            if (!fileInput.files[0]) return alert('الرجاء اختيار صورة أولاً');
            
            btn.innerText = 'جاري الرفع...';
            try {
                const url = await uploadFileToSupabase(fileInput.files[0]);
                document.getElementById('logoUrlInput').value = url;
                document.getElementById('logoPreview').src = url;
                document.getElementById('logoPreview').style.display = 'block';
                showToast("تم رفع الشعار. اضغط 'حفظ التعديلات' لتثبيته.");
            } catch(e) {}
            btn.innerText = 'رفع الصورة';
        }

        async function uploadHeroBg() {
            const fileInput = document.getElementById('heroBgFileInput');
            const btn = document.getElementById('btnUploadHero');
            if (!fileInput.files[0]) return alert('الرجاء اختيار صورة أولاً');
            
            btn.innerText = 'جاري الرفع...';
            try {
                const url = await uploadFileToSupabase(fileInput.files[0]);
                document.getElementById('heroBgInput').value = url;
                document.getElementById('heroBgPreview').src = url;
                document.getElementById('heroBgPreview').style.display = 'block';
                showToast("تم رفع البانر. اضغط 'حفظ التعديلات' لتثبيته.");
            } catch(e) {}
            btn.innerText = 'رفع الصورة';
        }

        async function uploadGalleryImage() {
            const fileInput = document.getElementById('newImageFileInput');
            const btn = document.getElementById('btnUploadGallery');
            if (!fileInput.files[0]) return alert('الرجاء اختيار صورة أولاً');
            
            btn.innerText = 'جاري الرفع...';
            try {
                const url = await uploadFileToSupabase(fileInput.files[0]);
                const {error} = await sb.from('gallery').insert([{ image_url: url }]);
                if (error) throw error;
                fileInput.value = '';
                await loadData();
                showToast("تم إضافة الصورة للمعرض مباشرة.");
            } catch(e) {
                alert(e.message);
            }
            btn.innerText = 'رفع الصورة';
        }

        async function removeImage(id) {
            if(confirm('هل أنت متأكد من حذف هذه الصورة؟')) {
                await sb.from('gallery').delete().eq('id', id);
                await loadData();
            }
        }

        function renderGallery(gallery) {
            var container = document.getElementById('galleryContainer');
            container.innerHTML = '';
            gallery.forEach(function(item) {
                var div = document.createElement('div');
                div.className = 'gallery-item';
                div.innerHTML = '<img src="' + item.image_url + '"><button onclick="removeImage(\'' + item.id + '\')">X</button>';
                container.appendChild(div);
            });
        }

        async function uploadVideoFile() {
            const fileInput = document.getElementById('newVideoFileInput');
            const btn = document.getElementById('btnUploadVideo');
            if (!fileInput.files[0]) return alert('الرجاء اختيار فيديو أولاً');
            
            if (fileInput.files[0].size > 50 * 1024 * 1024) {
                return alert('حجم الفيديو كبير جداً! الحد الأقصى للرفع هو 50 ميجابايت لضمان سرعة الموقع. الرجاء ضغط الفيديو أو استخدام رابط يوتيوب.');
            }
            
            btn.innerText = 'جاري الرفع... الرجاء الانتظار';
            try {
                const url = await uploadFileToSupabase(fileInput.files[0]);
                const {error} = await sb.from('videos').insert([{ video_url: url }]);
                if (error) throw error;
                fileInput.value = '';
                await loadData();
                showToast("تم إضافة الفيديو بنجاح.");
            } catch(e) {
                alert("فشل الرفع: " + e.message);
            }
            btn.innerText = 'رفع الفيديو';
        }

        async function addVideoLink() {
            var input = document.getElementById('newVideoInput');
            var url = input.value;
            if (url) {
                try {
                    const {error} = await sb.from('videos').insert([{ video_url: url }]);
                    if(error) throw error;
                    input.value = '';
                    await loadData();
                    showToast("تم إضافة رابط الفيديو.");
                } catch(e) { alert(e.message); }
            }
        }

        async function removeVideo(id) {
            if(confirm('هل أنت متأكد من حذف هذا الفيديو؟')) {
                await sb.from('videos').delete().eq('id', id);
                await loadData();
            }
        }

        function renderVideos(videos) {
            var container = document.getElementById('videosContainer');
            container.innerHTML = '';
            videos.forEach(function(item) {
                var div = document.createElement('div');
                div.style.position = 'relative';
                div.style.width = '200px';
                div.style.padding = '10px';
                div.style.background = '#f1f5f9';
                div.style.borderRadius = '8px';
                div.style.wordBreak = 'break-all';
                div.innerHTML = '<a href="' + item.video_url + '" target="_blank" style="font-size:14px;">' + item.video_url.substring(0, 30) + '...</a><button onclick="removeVideo(\'' + item.id + '\')" style="position:absolute; top:-5px; right:-5px; background:red; color:white; border:none; border-radius:50%; width:20px; height:20px; cursor:pointer;">X</button>';
                container.appendChild(div);
            });
        }
    </script>
</body>
</html>
